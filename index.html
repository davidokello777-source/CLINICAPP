<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;font-family:'DM Sans',sans-serif}
body{background:#f0f5ee;overflow:hidden}
input,select,textarea,button{font-family:'DM Sans',sans-serif}
input:focus,select:focus,textarea:focus{outline:none!important;border-color:#2e7d32!important;box-shadow:0 0 0 3px rgba(46,125,50,.13)!important}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#b0cba8;border-radius:2px}
button:not(:disabled):active{transform:scale(.97)}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.pg{animation:fi .18s ease}
@media print {
  body { overflow: visible !important; background: #fff !important; }
  #root { height: auto !important; overflow: visible !important; }
  .no-print, .sidebar-wrap, .topbar { display: none !important; }
  .print-area { display: block !important; }
  @page { margin: 15mm; size: A4; }
}
.print-area { display: none; }
.print-watermark {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) rotate(-35deg);
  opacity: 0.07; pointer-events: none; z-index: 9999;
  width: 420px; height: auto;
}

</style>

/* ══════════ CRUD HOOK (in-memory) ════════════════════════════ */
function useCRUD(seed) {
  const [items, setItems] = useState(seed);
  const [delTarget, setDelTarget] = useState(null);
  const add    = item => setItems(p => [...p, { id: Date.now(), ...item }]);
  const upd    = (id, patch) => setItems(p => p.map(x => x.id === id ? { ...x, ...patch } : x));
  const askDel = (id, label) => setDelTarget({ id, label });
  const confirmDel = () => { setItems(p => p.filter(x => x.id !== delTarget.id)); setDelTarget(null); };
  const cancelDel  = () => setDelTarget(null);
  return { items, add, upd, askDel, confirmDel, cancelDel, delTarget };
}

/* ══════════ USER MANAGEMENT (Admin only) ════════════════════ */
const BLANK_U = { username:"", password:"", role:"manager", name:"", active:true };
function Users({ users, setUsers, canDelete }) {
  const [modal, setModal] = useState(null);
  const [form, setForm]   = useState(BLANK_U);
  const [delT, setDelT]   = useState(null);
  const isEdit = modal && modal !== "add";
  const f = k => e => setForm(p => ({ ...p, [k]: e.target.value }));
  const save = () => {
    if (!form.username || !form.password) return alert("Username and password required.");
    if (!isEdit && users.find(u => u.username === form.username)) return alert("Username already exists.");
    if (isEdit) setUsers(p => p.map(x => x.id === form.id ? form : x));
    else setUsers(p => [...p, { id: Date.now(), ...form }]);
    setModal(null);
  };
  const rl = ROLE_INFO[form.role];
  return (
    <div>
      <PH icon="users" title="User Management" sub="Administrator can add, edit and manage all system users" onAdd={() => { setForm(BLANK_U); setModal("add"); }} addLabel="Add User" ac="#1a3a2a" />
      <div style={{ background:"#fff3cd", border:"1px solid #d4a017", borderRadius:10, padding:"10px 14px", marginBottom:14, fontSize:13, color:"#6d4c00", display:"flex", gap:8 }}>
        <Ico n="warn" s={15} /> <span><strong>Admin only:</strong> Admins have full access. Managers can add & edit. Viewers are read-only.</span>
      </div>
      <Tbl cols={["Name","Username","Role","Status","Actions"]} data={users}
        row={r => [
          <TD key="n" bold>{r.name}</TD>,
          <TD key="u"><code style={{ background:"#f5f5f5", padding:"2px 5px", borderRadius:4, fontSize:11 }}>{r.username}</code></TD>,
          <TD key="r"><Badge text={ROLE_INFO[r.role]?.label||r.role} color={r.role==="admin"?"gold":r.role==="manager"?"green":"blue"}/></TD>,
          <TD key="st"><Badge text={r.active!==false?"Active":"Inactive"} color={r.active!==false?"green":"gray"}/></TD>,
          <TD key="a"><EditBtn onClick={() => { setForm({...r}); setModal(r); }} /><DelBtn onClick={() => setDelT({id:r.id,label:r.name})} disabled={!canDelete}/></TD>,
        ]}
      />
      {delT && <ConfirmDel name={delT.label} onOk={() => { setUsers(p => p.filter(x => x.id !== delT.id)); setDelT(null); }} onNo={() => setDelT(null)} />}
      {modal && (
        <Modal title={isEdit ? "Edit User" : "Add System User"} onClose={() => setModal(null)} accent="#1a3a2a">
          <Grid2>
            <F label="Full Name" span2><Inp value={form.name} onChange={f("name")} placeholder="e.g. John Tumusiime" /></F>
            <F label="Username (login)"><Inp value={form.username} onChange={f("username")} placeholder="e.g. john" disabled={isEdit} sx={{ background: isEdit?"#f5f5f5":"" }} /></F>
            <F label="Password"><Inp type="password" value={form.password} onChange={f("password")} placeholder="Set password" /></F>
            <F label="Role">
              <Sel value={form.role} onChange={f("role")}>
                <option value="admin">Administrator</option>
                <option value="manager">Farm Manager</option>
                <option value="viewer">Viewer (Read-only)</option>
              </Sel>
            </F>
            <F label="Account Status">
              <Sel value={form.active ? "true" : "false"} onChange={e => setForm(p => ({ ...p, active: e.target.value === "true" }))}>
                <option value="true">Active</option>
                <option value="false">Inactive (blocked)</option>
              </Sel>
            </F>
          </Grid2>
          <div style={{ background:"#e8f5e9", borderRadius:8, padding:"8px 12px", marginBottom:12, fontSize:12.5, color:"#1b5e20" }}>
            {form.role==="admin"?"Full access — add, edit, delete and manage users.":form.role==="manager"?"Can add and edit records. Cannot delete or manage users.":"Read-only — can view all data, no changes allowed."}
          </div>
          <button onClick={save} style={{ ...cs.btn, width:"100%", background:"linear-gradient(135deg,#1a3a2a,#2e5c20)", color:"#fff" }}>{isEdit ? "Save Changes" : "Create User"}</button>
        </Modal>
      )}
    </div>
  );
}

              <div style={{gridColumn:"1/-1",borderBottom:"1px solid #e0eed9",margin:"4px 0 8px"}}><span style={{fontSize:11,color:"#2e7d32",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px"}}>Deworming & Treatment</span></div>

          {tab === "feed" && (

              <F label="Housing System"><Sel value={form.housing} onChange={f("housing")}>{["Free-range","Confined (Zero-grazing)","Semi-confined","Paddock Grazing","Rotational Grazing","Deep Litter","Cage System"].map(x=><option key={x}>{x}</option>)}</Sel></F>
              <F label="Feed Type / Programme"><Sel value={form.feedType} onChange={f("feedType")}>{["Pasture Only","Concentrates Only","Pasture + Concentrates","Total Mixed Ration (TMR)","Broiler Starter","Broiler Finisher","Layer Mash","Dairy Meal","Pig Grower","Custom Mix"].map(x=><option key={x}>{x}</option>)}</Sel></F>

              <F label="Feed Supplier" span2><Inp value={form.feedSupplier} onChange={f("feedSupplier")}/></F>
              {form.count && form.dailyFeedPerHead && (
                <F label="Total Daily Feed Required" span2>
                  <div style={{ padding:"9px 12px", background:"#e3f2fd", borderRadius:8, fontWeight:700, color:"#1565c0", fontSize:13 }}>
                    {(Number(form.count)*Number(form.dailyFeedPerHead)).toFixed(1)} kg/day &nbsp;·&nbsp; {(Number(form.count)*Number(form.dailyFeedPerHead)*30).toFixed(0)} kg/month
                  </div>
                </F>
              )}
            </Grid2>
          )}
          {tab === "breed" && (
            <Grid2>
              <F label="Breeding Status"><Sel value={form.breedingStatus} onChange={f("breedingStatus")}>{["Open","Pregnant","Lactating","Dry","Growing (pre-breeding)","N/A","Mixed Flock"].map(x=><option key={x}>{x}</option>)}</Sel></F>
              <F label="Sire / Bull / Buck ID"><Inp value={form.breedingBullID} onChange={f("breedingBullID")} placeholder="Sire ID"/></F>
              <F label="Last Service / AI Date"><Inp type="date" value={form.lastServiceDate} onChange={f("lastServiceDate")}/></F>
              <F label="Expected Calving / Kidding Date"><Inp type="date" value={form.expectedCalvingDate} onChange={f("expectedCalvingDate")}/></F>
              <F label="Last Birth / Hatch Date"><Inp type="date" value={form.lastBirthDate} onChange={f("lastBirthDate")}/></F>
              <F label="Offspring Born This Season"><Inp type="number" value={form.offspringThisSeason} onChange={f("offspringThisSeason")}/></F>
            </Grid2>
          )}
          {tab === "prod" && (
            <Grid2>
              {isCattle && <>
                <div style={{gridColumn:"1/-1",borderBottom:"1px solid #e0eed9",margin:"0 0 8px"}}><span style={{fontSize:11,color:"#2e7d32",fontWeight:700,textTransform:"uppercase"}}>Dairy Production</span></div>
                <F label="Daily Milk Yield (L/cow)"><Inp type="number" value={form.dailyMilkYield} onChange={f("dailyMilkYield")} placeholder="e.g. 18"/></F>
                <F label="Lactation Number"><Inp type="number" value={form.lactationNumber} onChange={f("lactationNumber")} placeholder="e.g. 3"/></F>
                <F label="Milking Frequency"><Sel value={form.milkingFrequency} onChange={f("milkingFrequency")}><option>2x daily</option><option>3x daily</option><option>Once daily</option><option>Not milking</option></Sel></F>
                {form.count && form.dailyMilkYield && (
                  <F label="Herd Total Daily Production">
                    <div style={{ padding:"9px 12px", background:"#e8f5e9", borderRadius:8, fontWeight:700, color:"#1b5e20", fontSize:13 }}>
                      {(Number(form.count)*Number(form.dailyMilkYield)).toFixed(0)} L/day &nbsp;·&nbsp; {(Number(form.count)*Number(form.dailyMilkYield)*30).toFixed(0)} L/month
                    </div>
                  </F>
                )}
              </>}
              {isPoultry && <>
                <div style={{gridColumn:"1/-1",borderBottom:"1px solid #e0eed9",margin:"0 0 8px"}}><span style={{fontSize:11,color:"#2e7d32",fontWeight:700,textTransform:"uppercase"}}>Poultry Production</span></div>
                <F label="Weekly Egg Production (layers)"><Inp type="number" value={form.weeklyEggProd} onChange={f("weeklyEggProd")}/></F>
                <F label="Feed Conversion Ratio (FCR)"><Inp type="number" value={form.fcr} onChange={f("fcr")} placeholder="e.g. 1.8"/></F>
                <F label="Mortality Count (this batch)"><Inp type="number" value={form.mortalityCount} onChange={f("mortalityCount")}/></F>
                <F label="Mortality Rate (%)"><Inp type="number" value={form.mortalityRate} onChange={f("mortalityRate")}/></F>
              </>}
              <div style={{gridColumn:"1/-1",borderBottom:"1px solid #e0eed9",margin:"4px 0 8px"}}><span style={{fontSize:11,color:"#2e7d32",fontWeight:700,textTransform:"uppercase"}}>Weight & Growth</span></div>
              <F label="Live Weight (kg avg)"><Inp type="number" value={form.currentWeight} onChange={f("currentWeight")}/></F>
              <F label="Avg Daily Gain (kg/day)"><Inp type="number" value={form.adg} onChange={f("adg")} placeholder="e.g. 0.8"/></F>
              <F label="Notes / Observations" span2><Txt value={form.notes} onChange={f("notes")} placeholder="Production notes, targets..."/></F>
            </Grid2>
          )}
          <div style={{ display:"flex", gap:10, marginTop:12, borderTop:"1px solid #e0eed9", paddingTop:12 }}>
            {tabIdx > 0 && <button onClick={() => setTab(LIVE_TABS[tabIdx-1].id)} style={{ ...cs.btn, border:"1.5px solid #c8dfc0", background:"#fff", color:"#1565c0" }}>← Back</button>}
            {tabIdx < LIVE_TABS.length-1
              ? <button onClick={() => setTab(LIVE_TABS[tabIdx+1].id)} style={{ ...cs.btn, flex:1, background:"linear-gradient(135deg,#1565c0,#1976d2)", color:"#fff" }}>Next →</button>
              : <button onClick={save} style={{ ...cs.btn, flex:1, background:"linear-gradient(135deg,#1565c0,#1976d2)", color:"#fff" }}>{isEdit?"Save Changes":"Save Livestock"}</button>
            }
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ══════════ SIMPLE CRUD MODULES ═════════════════════════════ */
function Suppliers({ crud, canDelete, canEdit }) {
  const { items, add, upd, askDel, confirmDel, cancelDel, delTarget } = crud;
  const [modal, setModal] = useState(null);
  const BK = {name:"",category:"Seeds",contact:"",phone:"",email:"",status:"Active"};
  const [form, setForm] = useState(BK);
  const isEdit = modal && modal !== "add";
  const f = k => e => setForm(p => ({ ...p, [k]: e.target.value }));
  const save = () => { isEdit ? upd(form.id, form) : add(form); setModal(null); };
  return (
    <div>
      <PH icon="suppliers" title="Suppliers" sub={`${items.length} registered`} onAdd={() => { setForm(BK); setModal("add"); }} addLabel="Add Supplier" ac="#37474f" canAdd={canEdit} />
      <Tbl cols={["Supplier","Category","Contact","Phone","Email","Status","Actions"]} data={items}
        row={r => [<TD key="n" bold>{r.name}</TD>,<TD key="c"><Badge text={r.category} color="blue"/></TD>,<TD key="cp">{r.contact}</TD>,<TD key="ph">{r.phone}</TD>,<TD key="em" style={{fontSize:11.5}}>{r.email}</TD>,<TD key="st"><Badge text={r.status} color={r.status==="Active"?"green":"gray"}/></TD>,<TD key="a">{canEdit&&<EditBtn onClick={()=>{setForm({...r});setModal(r);}}/>}<DelBtn onClick={()=>askDel(r.id,r.name)} disabled={!canDelete}/></TD>]}
      />
      {delTarget && <ConfirmDel name={delTarget.label} onOk={confirmDel} onNo={cancelDel} />}
      {modal && <Modal title={isEdit?"Edit Supplier":"Add Supplier"} onClose={()=>setModal(null)} accent="#37474f">
        <Grid2>
          <F label="Supplier Name" span2><Inp value={form.name} onChange={f("name")}/></F>
          <F label="Category"><Sel value={form.category} onChange={f("category")}>{["Seeds","Fertilizer","Animal Feed","Tools","Veterinary","Chemicals","Transport","Other"].map(x=><option key={x}>{x}</option>)}</Sel></F>
          <F label="Status"><Sel value={form.status} onChange={f("status")}>{["Active","Inactive","On Hold"].map(x=><option key={x}>{x}</option>)}</Sel></F>
          <F label="Contact Person"><Inp value={form.contact} onChange={f("contact")}/></F>
          <F label="Phone"><Inp value={form.phone} onChange={f("phone")}/></F>
          <F label="Email" span2><Inp type="email" value={form.email} onChange={f("email")}/></F>
        </Grid2>
        <button onClick={save} style={{...cs.btn,width:"100%",background:"linear-gradient(135deg,#37474f,#546e7a)",color:"#fff"}}>{isEdit?"Save Changes":"Add Supplier"}</button>
      </Modal>}
    </div>
  );
}

const ITABS=[{id:"main",label:"📦 Item Details"},{id:"stock",label:"📊 Stock & Valuation"},{id:"extra",label:"📋 Storage & Notes"}];
const BKINV={item:"",category:"Seeds",supplier:"",unit:"Bags",qty:"",unitPrice:"",reorderLevel:"",dateReceived:"",expiryDate:"",batchNo:"",storageLocation:"",condition:"Good",notes:""};
function Inventory({crud,canDelete,canEdit,suppliers}){
  const{items,add,upd,askDel,confirmDel,cancelDel,delTarget}=crud;
  const[modal,setModal]=useState(null);
  const[form,setForm]=useState(BKINV);
  const[tab,setTab]=useState("main");
  const isEdit=modal&&modal!=="add";
  const f=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const open=r=>{setForm(r?{...r}:BKINV);setTab("main");setModal(r||"add");};
  const save=()=>{isEdit?upd(form.id,form):add(form);setModal(null);};
  const ti=ITABS.findIndex(t=>t.id===tab);
  const stockVal=items.reduce((s,x)=>s+Number(x.unitPrice||0)*Number(x.qty||0),0);
  const lowStock=items.filter(x=>x.reorderLevel&&Number(x.qty)<=Number(x.reorderLevel));
  return(
    <div className="pg">
      <div style={{display:"flex",justifyContent:"flex-end",gap:6,marginBottom:10}}><PrintBtn label="Inventory Report" onClick={()=>printInventoryReport(items)} color="#e65100"/></div>
      <PH icon="inventory" title="Inventory" sub={`${items.length} items \u00b7 Stock value: ${ugx(stockVal)}${lowStock.length>0?" \u00b7 "+lowStock.length+" low stock!":""}`} onAdd={()=>open(null)} addLabel="Add Item" ac="#e65100" canAdd={canEdit}/>
      {lowStock.length>0&&<div style={{background:"#fff8e1",border:"1px solid #ffe082",borderRadius:10,padding:"9px 13px",marginBottom:13,fontSize:12.5,color:"#6d4c00",display:"flex",gap:8}}>
        <Ico n="warn" s={14}/> <span><strong>Low Stock:</strong> {lowStock.map(x=>`${x.item} (${x.qty} ${x.unit})`).join(", ")}</span>
      </div>}
      <Tbl cols={["Item","Category","Qty","Unit Price","Stock Value","Supplier","Batch No.","Expiry","Condition","Actions"]} data={items}
        row={r=>[
          <TD key="i" bold>{r.item}</TD>,
          <TD key="c"><Badge text={r.category} color="blue"/></TD>,
          <TD key="q">{r.qty} {r.unit}</TD>,
          <TD key="up">{r.unitPrice?ugx(r.unitPrice):"—"}</TD>,
          <TD key="sv" bold>{r.unitPrice&&r.qty?ugx(Number(r.unitPrice)*Number(r.qty)):"—"}</TD>,
          <TD key="s">{r.supplier||"—"}</TD>,
          <TD key="bn">{r.batchNo||"—"}</TD>,
          <TD key="ex">{r.expiryDate?<span style={{color:new Date(r.expiryDate)<new Date()?"#c62828":"#388e3c",fontWeight:600,fontSize:11.5}}>{r.expiryDate}</span>:"—"}</TD>,
          <TD key="cond"><Badge text={r.condition||"Good"} color={r.condition==="Expired"||r.condition==="Damaged"?"red":r.condition==="Fair"?"yellow":"green"}/></TD>,
          <TD key="a">{canEdit&&<EditBtn onClick={()=>open(r)}/>}<DelBtn onClick={()=>askDel(r.id,r.item)} disabled={!canDelete}/></TD>,
        ]}
      />
      {delTarget&&<ConfirmDel name={delTarget.label} onOk={confirmDel} onNo={cancelDel}/>}
      {modal&&(
        <Modal title={isEdit?"Edit Item":"Add Inventory Item"} onClose={()=>setModal(null)} accent="#e65100" wide>
          <TabBar tabs={ITABS} active={tab} set={setTab}/>
          {tab==="main"&&<Grid2>
            <F label="Item Name" span2><Inp value={form.item} onChange={f("item")} placeholder="Full descriptive item name"/></F>
            <F label="Category"><Sel value={form.category} onChange={f("category")}>{["Seeds","Fertilizer","Animal Feed","Tools","Pesticides","Herbicides","Veterinary","Packaging","Fuel & Lubricants","Other"].map(x=><option key={x}>{x}</option>)}</Sel></F>
            <F label="Supplier"><Sel value={form.supplier} onChange={f("supplier")}><option value="">— Select supplier —</option>{suppliers.map(s=><option key={s.id} value={s.name}>{s.name}</option>)}</Sel></F>
            <F label="Quantity Received"><Inp type="number" value={form.qty} onChange={f("qty")}/></F>
            <F label="Unit of Measure"><Sel value={form.unit} onChange={f("unit")}>{["Bags","Kg","Litres","Units","Boxes","Jerricans","Tonnes","Crates","Bundles","Rolls"].map(x=><option key={x}>{x}</option>)}</Sel></F>
            <F label="Date Received"><Inp type="date" value={form.dateReceived} onChange={f("dateReceived")}/></F>
            <F label="Batch / Lot Number"><Inp value={form.batchNo} onChange={f("batchNo")} placeholder="e.g. SL-2025-001"/></F>
          </Grid2>}
          {tab==="stock"&&<Grid2>
            <F label="Unit Price (UGX)"><Inp type="number" value={form.unitPrice} onChange={f("unitPrice")} placeholder="Price per unit/bag/litre"/></F>
            <F label="Reorder Level"><Inp type="number" value={form.reorderLevel} onChange={f("reorderLevel")} placeholder="Min qty before reorder alert"/></F>
            {form.unitPrice&&form.qty&&<F label="Total Stock Value" span2>
              <div style={{padding:"9px 12px",background:"#e8f5e9",borderRadius:8,fontWeight:700,color:"#1b5e20",fontSize:13}}>
                {ugx(Number(form.unitPrice)*Number(form.qty))} &mdash; {form.qty} {form.unit} @ {ugx(form.unitPrice)} each
              </div>
            </F>}
            {form.reorderLevel&&Number(form.qty)<=Number(form.reorderLevel)&&<F label="Reorder Alert" span2>
              <div style={{padding:"9px 12px",background:"#ffebee",borderRadius:8,fontWeight:700,color:"#c62828",fontSize:13}}>
                Current stock ({form.qty} {form.unit}) is at or below reorder level ({form.reorderLevel} {form.unit}). Please restock.
              </div>
            </F>}
            <F label="Expiry Date"><Inp type="date" value={form.expiryDate} onChange={f("expiryDate")}/></F>
            <F label="Current Condition"><Sel value={form.condition} onChange={f("condition")}>{["Excellent","Good","Fair","Damaged","Expired"].map(x=><option key={x}>{x}</option>)}</Sel></F>
          </Grid2>}
          {tab==="extra"&&<Grid2>
            <F label="Storage Location" span2><Inp value={form.storageLocation} onChange={f("storageLocation")} placeholder="e.g. Store A — Shelf 1"/></F>
            <F label="Notes / Handling Instructions" span2><Txt value={form.notes} onChange={f("notes")} placeholder="Storage requirements, handling notes, usage instructions..."/></F>
          </Grid2>}
          <div style={{display:"flex",gap:10,marginTop:12,borderTop:"1px solid #e0eed9",paddingTop:12}}>
            {ti>0&&<button onClick={()=>setTab(ITABS[ti-1].id)} style={{padding:"10px 16px",border:"1.5px solid #c8dfc0",borderRadius:9,background:"#fff",cursor:"pointer",fontWeight:600,fontSize:13,color:"#e65100"}}>← Back</button>}
            {ti<ITABS.length-1
              ?<button onClick={()=>setTab(ITABS[ti+1].id)} style={{flex:1,padding:10,background:"linear-gradient(135deg,#e65100,#f57c00)",color:"#fff",border:"none",borderRadius:9,cursor:"pointer",fontWeight:700,fontSize:13}}>Next →</button>
              :<button onClick={save} style={{flex:1,padding:10,background:"linear-gradient(135deg,#e65100,#f57c00)",color:"#fff",border:"none",borderRadius:9,cursor:"pointer",fontWeight:700,fontSize:13}}>{isEdit?"Save Changes":"Add Item"}</button>
            }
          </div>
        </Modal>
      )}
    </div>
  );
}

function Reports({ data }) {
  const rev=data.sales.reduce((s,x)=>s+Number(x.unitPrice||x.price||0)*Number(x.qty||1)*(1-Number(x.discount||0)/100),0);
  const exp=data.expenses.reduce((s,x)=>s+Number(x.amount||0),0);
  const profit=rev-exp;
  const expByT=data.expenses.reduce((a,e)=>{a[e.type]=(a[e.type]||0)+Number(e.amount||0);return a;},{});
  const salesByP=data.sales.reduce((a,s)=>{a[s.product]=(a[s.product]||0)+(Number(s.price||0)*Number(s.qty||1));return a;},{});
  const maxE=Math.max(...Object.values(expByT),1); const maxS=Math.max(...Object.values(salesByP),1);
  const Card=({title,children,color="#2e7d32"})=>(<div style={{background:"#fff",borderRadius:12,padding:"1.3rem",boxShadow:"0 2px 10px rgba(0,0,0,.07)",marginBottom:14,borderTop:`4px solid ${color}`}}><h3 style={{margin:"0 0 .9rem",fontFamily:"Georgia,serif",color:"#1a3a2a",fontSize:"1rem"}}>{title}</h3>{children}</div>);
  const Bar=({label,value,max,color})=>(<div style={{marginBottom:9}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span style={{fontWeight:600}}>{label}</span><span style={{color:"#888"}}>{ugx(value)}</span></div><div style={{background:"#f0f0f0",borderRadius:5,height:8}}><div style={{width:`${Math.min(100,(value/max)*100)}%`,background:color,borderRadius:5,height:8}}/></div></div>);
  return (
    <div>
      <div style={{display:"flex",justifyContent:"flex-end",gap:6,marginBottom:10}}>
        <PrintBtn label="Full Farm Report" onClick={()=>printFarmSummary(data)} color="#1a3a2a"/>
        <PrintBtn label="Sales Report" onClick={()=>printSalesReport(data.sales)} color="#c62828"/>
        <PrintBtn label="Expense Report" onClick={()=>printExpenseReport(data.expenses)} color="#e65100"/>
      </div>
      <PH icon="reports" title="Reports & Analytics" sub="Farm performance — Uganda Shillings (UGX)"/>
      <Card title="📊 Profit & Loss">
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:11}}>
          {[{l:"Revenue",v:ugx(rev),c:"#2e7d32"},{l:"Expenses",v:ugx(exp),c:"#c62828"},{l:"Net Profit",v:ugx(profit),c:profit>=0?"#1565c0":"#c62828"},{l:"Margin",v:`${rev>0?((profit/rev)*100).toFixed(1):0}%`,c:profit>=0?"#00695c":"#c62828"}].map(x=>(<div key={x.l} style={{textAlign:"center",padding:".9rem",background:"#f8fdf6",borderRadius:9}}><div style={{fontSize:16,fontWeight:800,color:x.c}}>{x.v}</div><div style={{fontSize:11.5,color:"#888"}}>{x.l}</div></div>))}
        </div>
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:14}}>
        <Card title="💰 Expenses by Category" color="#f57c00">{Object.entries(expByT).map(([k,v])=><Bar key={k} label={k} value={v} max={maxE} color="#f57c00"/>)}</Card>
        <Card title="🛒 Revenue by Product" color="#1565c0">{Object.entries(salesByP).map(([k,v])=><Bar key={k} label={k} value={v} max={maxS} color="#1565c0"/>)}</Card>
      </div>
      <Card title="🌾 Production & Workforce Summary" color="#4caf50">
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:11}}>
          {[{l:"Crop Records",v:data.crops.length},{l:"Harvest Units",v:data.harvest.reduce((s,h)=>s+Number(h.qty||0),0)},{l:"Total Animals",v:data.livestock.reduce((s,l)=>s+Number(l.count||0),0)},{l:"Active Staff",v:data.workers.filter(w=>w.status==="Active").length},{l:"Suppliers",v:data.suppliers.length},{l:"Payroll/mo",v:ugx(data.workers.reduce((s,w)=>s+Number(w.salary||0),0))}].map(x=>(<div key={x.l} style={{textAlign:"center",padding:".9rem",background:"#e8f5e9",borderRadius:9}}><div style={{fontSize:15,fontWeight:800,color:"#1b5e20"}}>{x.v}</div><div style={{fontSize:11,color:"#4a7c59"}}>{x.l}</div></div>))}
        </div>
      </Card>
      <Card title="🌱 Crop Economics Summary" color="#43a047">
        <Tbl cols={["Crop","Field","Area","Stage","Input Cost","Revenue","Profit"]} data={data.crops}
          row={r=>[<TD key="n" bold>{r.name}</TD>,<TD key="f">{r.field||"—"}</TD>,<TD key="a">{r.area?`${r.area} ${r.areaUnit}`:"—"}</TD>,<TD key="s"><Badge text={r.status} color={r.status==="Growing"||r.status==="Vegetative"?"green":r.status==="Harvested"?"blue":"yellow"}/></TD>,<TD key="ic">{r.inputCost?ugx(r.inputCost):"—"}</TD>,<TD key="er">{r.expectedRevenue?ugx(r.expectedRevenue):"—"}</TD>,<TD key="pr">{r.inputCost&&r.expectedRevenue?<span style={{fontWeight:700,color:Number(r.expectedRevenue)>=Number(r.inputCost)?"#1b5e20":"#c62828"}}>{ugx(Number(r.expectedRevenue)-Number(r.inputCost))}</span>:"—"}</TD>]}
        />
      </Card>
    </div>
  );
}

function printDocument(htmlContent) {
  const win = window.open('', '_blank', 'width=900,height=700');
  win.document.write(htmlContent);
  win.document.close();
  win.focus();
  setTimeout(() => { win.print(); }, 600);
}

function buildPrintHeader(title, subtitle) {
  return `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:16px;border-bottom:3px solid #2e7d32;margin-bottom:20px">

        <img src="${LOGO}" style="height:70px;width:auto"/>
        <div>
          <div style="font-size:22px;font-weight:800;color:#1a3a2a;font-family:'Georgia',serif">Tali Agro Farm &amp; Processing Ltd</div>
          <div style="font-size:13px;color:#555;margin-top:2px">${subtitle||''}</div>
          <div style="font-size:12px;color:#888;margin-top:2px">Date Printed: ${new Date().toLocaleDateString('en-UG',{day:'2-digit',month:'long',year:'numeric'})}</div>
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-size:18px;font-weight:800;color:#1a3a2a">${title}</div>
        <div style="font-size:12px;color:#888;margin-top:4px">Uganda Shillings (UGX)</div>

}

const ugxP = v => `UGX ${Number(v||0).toLocaleString()}`;

/* ─── Invoice Print ─────────────────────────────────────────── */
function printInvoice(sale) {
  const subtotal = Number(sale.unitPrice||0) * Number(sale.qty||1);
  const disc     = subtotal * (Number(sale.discount||0)/100);
  const total    = subtotal - disc;
  const body = `
    ${buildPrintHeader(`INVOICE #${sale.invoiceNo||'—'}`, 'Sales Invoice')}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
      <div style="background:#f5faf3;border-radius:8px;padding:14px">
        <div style="font-weight:700;color:#1a3a2a;margin-bottom:8px;font-size:13px">BILL TO:</div>
        <div style="font-size:15px;font-weight:700">${sale.customer||'—'}</div>
        ${sale.phone?`<div style="color:#555;margin-top:3px">📞 ${sale.phone}</div>`:''}
        ${sale.address?`<div style="color:#555;margin-top:3px">📍 ${sale.address}</div>`:''}
      </div>
      <div style="background:#f5faf3;border-radius:8px;padding:14px">
        <div style="font-weight:700;color:#1a3a2a;margin-bottom:8px;font-size:13px">INVOICE DETAILS:</div>
        <table style="font-size:12.5px"><tbody>
          <tr><td style="color:#666;padding:2px 0;border:none">Invoice No:</td><td style="font-weight:700;border:none">${sale.invoiceNo||'—'}</td></tr>
          <tr><td style="color:#666;padding:2px 0;border:none">Date:</td><td style="border:none">${sale.saleDate||'—'}</td></tr>
          <tr><td style="color:#666;padding:2px 0;border:none">Status:</td><td style="border:none"><span class="badge ${sale.payment==='Paid'?'badge-green':sale.payment==='Partial'?'badge-blue':'badge-yellow'}">${sale.payment}</span></td></tr>
          <tr><td style="color:#666;padding:2px 0;border:none">Payment:</td><td style="border:none">${sale.paymentMethod||'—'}</td></tr>
          ${sale.paymentDate?`<tr><td style="color:#666;padding:2px 0;border:none">Paid On:</td><td style="border:none">${sale.paymentDate}</td></tr>`:''}
        </tbody></table>
      </div>
    </div>
    <table style="margin-bottom:16px">
      <thead><tr><th>Description</th><th style="text-align:right">Qty</th><th style="text-align:right">Unit Price (UGX)</th><th style="text-align:right">Amount (UGX)</th></tr></thead>
      <tbody>
        <tr><td>${sale.product||'—'}</td><td style="text-align:right">${sale.qty||1}</td><td style="text-align:right">${ugxP(sale.unitPrice)}</td><td style="text-align:right">${ugxP(subtotal)}</td></tr>
        ${Number(sale.discount||0)>0?`<tr><td style="color:#e65100" colspan="3">Discount (${sale.discount}%)</td><td style="text-align:right;color:#c62828">- ${ugxP(disc)}</td></tr>`:''}
        <tr class="grand-total"><td colspan="3" style="text-align:right;padding-right:16px">TOTAL DUE</td><td style="text-align:right">${ugxP(total)}</td></tr>
      </tbody>
    </table>
    ${sale.notes?`<div style="background:#fff8e1;border-left:4px solid #d4a017;padding:10px 14px;border-radius:4px;margin-bottom:16px;font-size:12.5px"><strong>Notes:</strong> ${sale.notes}</div>`:''}
    ${sale.deliveredBy?`<div style="font-size:12px;color:#666;margin-bottom:16px">Delivered/Sold by: <strong>${sale.deliveredBy}</strong></div>`:''}

/* ─── Sales Report Print ────────────────────────────────────── */
function printSalesReport(sales) {
  const total = sales.reduce((s,x)=>s+Number(x.unitPrice||0)*Number(x.qty||1)*(1-Number(x.discount||0)/100),0);
  const paid  = sales.filter(x=>x.payment==='Paid').reduce((s,x)=>s+Number(x.unitPrice||0)*Number(x.qty||1)*(1-Number(x.discount||0)/100),0);
  const rows  = sales.map((s,i)=>`
    <tr>
      <td>${i+1}</td>
      <td>${s.invoiceNo||'—'}</td>
      <td>${s.saleDate||'—'}</td>
      <td><strong>${s.customer}</strong></td>
      <td>${s.product}</td>
      <td style="text-align:right">${s.qty}</td>
      <td style="text-align:right">${ugxP(s.unitPrice)}</td>
      <td style="text-align:right">${Number(s.discount||0)>0?s.discount+'%':'—'}</td>
      <td style="text-align:right;font-weight:600">${ugxP(Number(s.unitPrice||0)*Number(s.qty||1)*(1-Number(s.discount||0)/100))}</td>
      <td><span class="badge ${s.payment==='Paid'?'badge-green':s.payment==='Partial'?'badge-blue':'badge-yellow'}">${s.payment}</span></td>
    </tr>`).join('');
  const body = `
    ${buildPrintHeader('SALES REPORT', `${sales.length} transactions`)}
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px">
      <div style="background:#e8f5e9;border-radius:8px;padding:12px;text-align:center"><div style="font-size:18px;font-weight:800;color:#1b5e20">${ugxP(total)}</div><div style="font-size:11px;color:#4a7c59">Total Revenue</div></div>
      <div style="background:#e3f2fd;border-radius:8px;padding:12px;text-align:center"><div style="font-size:18px;font-weight:800;color:#1565c0">${ugxP(paid)}</div><div style="font-size:11px;color:#1565c0">Amount Received</div></div>
      <div style="background:#ffebee;border-radius:8px;padding:12px;text-align:center"><div style="font-size:18px;font-weight:800;color:#c62828">${ugxP(total-paid)}</div><div style="font-size:11px;color:#c62828">Outstanding</div></div>
    </div>
    <table>
      <thead><tr><th>#</th><th>Invoice</th><th>Date</th><th>Customer</th><th>Product</th><th style="text-align:right">Qty</th><th style="text-align:right">Unit Price</th><th style="text-align:right">Disc.</th><th style="text-align:right">Total</th><th>Status</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr class="grand-total"><td colspan="8" style="text-align:right">GRAND TOTAL</td><td style="text-align:right">${ugxP(total)}</td><td></td></tr></tfoot>
    </table>
    <div class="sig-area" style="margin-top:30px">
      <div class="sig-box">Prepared By</div>
      <div class="sig-box">Reviewed By</div>
      <div class="sig-box">Approved By</div>
    </div>`;
  printDocument(buildPrintWrapper(body, 'Sales Report'));
}

/* ─── Expense Report Print ──────────────────────────────────── */
function printExpenseReport(expenses) {
  const total = expenses.reduce((s,x)=>s+Number(x.amount||0),0);
  const rows  = expenses.map((e,i)=>`
    <tr>
      <td>${i+1}</td>
      <td>${e.date||'—'}</td>
      <td><strong>${e.type}</strong></td>
      <td>${e.subType||'—'}</td>
      <td>${e.vendor||'—'}</td>
      <td>${e.receiptNo||'—'}</td>
      <td>${e.paymentMethod||'—'}</td>
      <td>${e.paidBy||'—'}</td>
      <td style="text-align:right;font-weight:600">${ugxP(e.amount)}</td>
    </tr>`).join('');
  const body = `
    ${buildPrintHeader('EXPENSE REPORT', `${expenses.length} expense records`)}
    <div style="background:#ffebee;border-radius:8px;padding:14px;text-align:center;margin-bottom:20px">
      <div style="font-size:24px;font-weight:800;color:#c62828">${ugxP(total)}</div>
      <div style="font-size:12px;color:#888">Total Expenditure</div>
    </div>
    <table>
      <thead><tr><th>#</th><th>Date</th><th>Type</th><th>Category</th><th>Vendor</th><th>Receipt No.</th><th>Method</th><th>Paid By</th><th style="text-align:right">Amount</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr class="grand-total"><td colspan="8" style="text-align:right">TOTAL EXPENSES</td><td style="text-align:right">${ugxP(total)}</td></tr></tfoot>
    </table>
    <div class="sig-area" style="margin-top:30px">
      <div class="sig-box">Prepared By</div>
      <div class="sig-box">Accounts Reviewed By</div>
      <div class="sig-box">Approved By / Director</div>
    </div>`;
  printDocument(buildPrintWrapper(body, 'Expense Report'));
}

/* ─── Inventory Report Print ────────────────────────────────── */
function printInventoryReport(inventory) {
  const total = inventory.reduce((s,x)=>s+Number(x.unitPrice||0)*Number(x.qty||0),0);
  const rows  = inventory.map((i,idx)=>`
    <tr>
      <td>${idx+1}</td>
      <td><strong>${i.item}</strong></td>
      <td>${i.category||'—'}</td>
      <td>${i.batchNo||'—'}</td>
      <td style="text-align:right">${i.qty} ${i.unit}</td>
      <td style="text-align:right">${i.unitPrice?ugxP(i.unitPrice):'—'}</td>
      <td style="text-align:right;font-weight:600">${i.unitPrice&&i.qty?ugxP(Number(i.unitPrice)*Number(i.qty)):'—'}</td>
      <td>${i.storageLocation||'—'}</td>
      <td>${i.expiryDate||'—'}</td>
      <td><span class="badge ${i.condition==='Good'||i.condition==='Excellent'?'badge-green':i.condition==='Fair'?'badge-yellow':'badge-red'}">${i.condition||'Good'}</span></td>
    </tr>`).join('');
  const body = `
    ${buildPrintHeader('INVENTORY REPORT', `${inventory.length} items`)}
    <div style="background:#e8f5e9;border-radius:8px;padding:14px;text-align:center;margin-bottom:20px">
      <div style="font-size:22px;font-weight:800;color:#1b5e20">${ugxP(total)}</div>
      <div style="font-size:12px;color:#4a7c59">Total Stock Value</div>
    </div>
    <table>
      <thead><tr><th>#</th><th>Item</th><th>Category</th><th>Batch No.</th><th style="text-align:right">Qty</th><th style="text-align:right">Unit Price</th><th style="text-align:right">Stock Value</th><th>Storage Location</th><th>Expiry</th><th>Condition</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr class="grand-total"><td colspan="6" style="text-align:right">TOTAL STOCK VALUE</td><td style="text-align:right">${ugxP(total)}</td><td colspan="3"></td></tr></tfoot>
    </table>
    <div class="sig-area" style="margin-top:30px">
      <div class="sig-box">Store Keeper</div>
      <div class="sig-box">Verified By</div>
      <div class="sig-box">Approved By</div>
    </div>`;
  printDocument(buildPrintWrapper(body, 'Inventory Report'));
}

/* ─── Farm Summary / P&L Print ──────────────────────────────── */
function printFarmSummary(data) {
  const rev  = data.sales.reduce((s,x)=>s+Number(x.unitPrice||0)*Number(x.qty||1)*(1-Number(x.discount||0)/100),0);
  const exp  = data.expenses.reduce((s,x)=>s+Number(x.amount||0),0);
  const stk  = data.inventory.reduce((s,x)=>s+Number(x.unitPrice||0)*Number(x.qty||0),0);
  const anml = data.livestock.reduce((s,x)=>s+Number(x.currentValuePerHead||0)*Number(x.count||0),0);
  const pay  = data.workers.reduce((s,x)=>s+Number(x.salary||0),0);
  const expByT=data.expenses.reduce((a,e)=>{a[e.type]=(a[e.type]||0)+Number(e.amount||0);return a;},{});
  const body = `
    ${buildPrintHeader('FARM MANAGEMENT REPORT', 'Comprehensive Summary — Tali Agro Farm & Processing Ltd')}
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:20px">
      <div style="background:#e8f5e9;border-radius:8px;padding:12px;text-align:center"><div style="font-size:17px;font-weight:800;color:#1b5e20">${ugxP(rev)}</div><div style="font-size:11px;color:#4a7c59">Total Revenue</div></div>
      <div style="background:#ffebee;border-radius:8px;padding:12px;text-align:center"><div style="font-size:17px;font-weight:800;color:#c62828">${ugxP(exp)}</div><div style="font-size:11px;color:#c62828">Total Expenses</div></div>
      <div style="background:#e3f2fd;border-radius:8px;padding:12px;text-align:center"><div style="font-size:17px;font-weight:800;color:#1565c0">${ugxP(rev-exp)}</div><div style="font-size:11px;color:#1565c0">Net Profit</div></div>
      <div style="background:#f3e5f5;border-radius:8px;padding:12px;text-align:center"><div style="font-size:17px;font-weight:800;color:#4a148c">${ugxP(stk+anml)}</div><div style="font-size:11px;color:#7b1fa2">Asset Value</div></div>
    </div>
    <table style="margin-bottom:18px">
      <thead><tr><th colspan="2">PROFIT & LOSS STATEMENT</th></tr></thead>
      <tbody>
        <tr><td style="font-weight:600">Total Sales Revenue</td><td style="text-align:right">${ugxP(rev)}</td></tr>
        ${Object.entries(expByT).map(([k,v])=>`<tr><td style="padding-left:20px;color:#555">${k}</td><td style="text-align:right;color:#c62828">- ${ugxP(v)}</td></tr>`).join('')}
        <tr class="total-row"><td>TOTAL EXPENSES</td><td style="text-align:right">- ${ugxP(exp)}</td></tr>
        <tr class="grand-total"><td>NET PROFIT / (LOSS)</td><td style="text-align:right">${ugxP(rev-exp)}</td></tr>
      </tbody>
    </table>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <table>
        <thead><tr><th colspan="2">OPERATIONS SUMMARY</th></tr></thead>
        <tbody>
          <tr><td>Crop Records</td><td style="text-align:right;font-weight:600">${data.crops.length}</td></tr>
          <tr><td>Total Animals</td><td style="text-align:right;font-weight:600">${data.livestock.reduce((s,l)=>s+Number(l.count||0),0)}</td></tr>
          <tr><td>Active Workers</td><td style="text-align:right;font-weight:600">${data.workers.filter(w=>w.status==='Active').length}</td></tr>
          <tr><td>Monthly Payroll</td><td style="text-align:right;font-weight:600">${ugxP(pay)}</td></tr>
          <tr><td>Inventory Items</td><td style="text-align:right;font-weight:600">${data.inventory.length}</td></tr>
          <tr><td>Stock Value</td><td style="text-align:right;font-weight:600">${ugxP(stk)}</td></tr>
          <tr><td>Livestock Value</td><td style="text-align:right;font-weight:600">${ugxP(anml)}</td></tr>
          <tr class="total-row"><td>Total Asset Value</td><td style="text-align:right">${ugxP(stk+anml)}</td></tr>
        </tbody>
      </table>
      <table>
        <thead><tr><th colspan="2">CROP ECONOMICS</th></tr></thead>
        <tbody>
          ${data.crops.map(c=>`<tr><td>${c.name} (${c.field||'—'})</td><td style="text-align:right;font-weight:600;color:${Number(c.expectedRevenue||0)>=Number(c.inputCost||0)?'#1b5e20':'#c62828'}">${c.inputCost&&c.expectedRevenue?ugxP(Number(c.expectedRevenue)-Number(c.inputCost)):'—'}</td></tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="sig-area" style="margin-top:30px">
      <div class="sig-box">Prepared By (Farm Manager)</div>
      <div class="sig-box">Reviewed By (Accountant)</div>
      <div class="sig-box">Approved By (Director)</div>
    </div>`;
  printDocument(buildPrintWrapper(body, 'Farm Management Report'));
}
